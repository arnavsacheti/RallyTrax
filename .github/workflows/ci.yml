name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version diff and tagging

      - name: Check for app changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="HEAD~1"
          fi

          if git diff --name-only "$BASE_SHA" HEAD | grep -qE '^(app/|gradle/|build\.gradle|settings\.gradle|gradlew)'; then
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
            echo "App-related files changed, running full pipeline"
          else
            echo "app_changed=false" >> "$GITHUB_OUTPUT"
            echo "No app changes detected, skipping lint/build/release"
          fi

      - name: Set up JDK 17
        if: steps.changes.outputs.app_changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.changes.outputs.app_changed == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Run lint
        if: steps.changes.outputs.app_changed == 'true'
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: ./gradlew lint

      - name: Run unit tests
        if: steps.changes.outputs.app_changed == 'true'
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: ./gradlew test

      # --- For PRs, just build the debug APK ---
      - name: Build debug APK (PR)
        if: github.event_name == 'pull_request' && steps.changes.outputs.app_changed == 'true'
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: ./gradlew assembleDebug

      - name: Upload debug APK (PR)
        if: github.event_name == 'pull_request' && steps.changes.outputs.app_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # --- Main branch: version bump locally, build, then commit/tag/release ---
      - name: Check if version was bumped in this commit
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          && steps.changes.outputs.app_changed == 'true'
        id: version_check
        run: |
          CURRENT_VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          if git diff HEAD~1 -- app/build.gradle.kts | grep -q 'versionName'; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-increment patch version
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          && steps.changes.outputs.app_changed == 'true'
          && steps.version_check.outputs.version_changed == 'false'
        id: bump
        run: |
          CURRENT="${{ steps.version_check.outputs.current_version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts)
          NEW_CODE=$((CURRENT_CODE + 1))

          sed -i "s/versionName = \"$CURRENT\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts
          sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped version: $CURRENT -> $NEW_VERSION (code $CURRENT_CODE -> $NEW_CODE)"

      # --- Build release APK with bumped version (uncommitted) ---
      - name: Decode release keystore
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          && steps.changes.outputs.app_changed == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/ci-release.jks

      - name: Build release APK
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          && steps.changes.outputs.app_changed == 'true'
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          KEYSTORE_FILE: ${{ github.workspace }}/app/ci-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      # --- Build succeeded: now commit version bump, tag, and release ---
      - name: Commit version bump
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          && steps.changes.outputs.app_changed == 'true'
          && steps.version_check.outputs.version_changed == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

      - name: Determine release version
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          && steps.changes.outputs.app_changed == 'true'
        id: release_version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION ($TAG)"

      - name: Tag new version
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          && steps.changes.outputs.app_changed == 'true'
        id: tagging
        run: |
          TAG="${{ steps.release_version.outputs.tag }}"

          if ! git tag -l "$TAG" | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release ${{ steps.release_version.outputs.version }}"
            git push origin "$TAG"
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "Created and pushed tag $TAG"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists, skipping"
          fi

      - name: Rename release APK
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          && steps.changes.outputs.app_changed == 'true'
        run: |
          VERSION="${{ steps.release_version.outputs.version }}"
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" "app/build/outputs/apk/release/RallyTrax-v${VERSION}.apk"
          fi

      - name: Generate release notes
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          && steps.changes.outputs.app_changed == 'true'
          && steps.tagging.outputs.created == 'true'
        id: release_notes
        run: |
          TAG="${{ steps.release_version.outputs.tag }}"

          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^$TAG$" | head -n 1)

          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges | grep -v '\[skip ci\]')
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | grep -v '\[skip ci\]')
          fi

          cat > /tmp/release_notes.md << NOTES_EOF
          ## What's Changed

          $CHANGELOG

          ---
          **Full Changelog**: ${PREV_TAG:+\`$PREV_TAG\`...\`$TAG\`}${PREV_TAG:-Initial release}
          NOTES_EOF

      - name: Create GitHub Release
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          && steps.changes.outputs.app_changed == 'true'
          && steps.tagging.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release_version.outputs.tag }}"
          VERSION="${{ steps.release_version.outputs.version }}"

          RELEASE_APK="app/build/outputs/apk/release/RallyTrax-v${VERSION}.apk"

          gh release create "$TAG" \
            --title "RallyTrax $VERSION" \
            --notes-file /tmp/release_notes.md \
            "$RELEASE_APK"
