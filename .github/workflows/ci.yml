name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Gate: detect if app files changed ────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.check.outputs.app_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for app changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="HEAD~1"
          fi
          if git diff --name-only "$BASE_SHA" HEAD | grep -qE '^(app/|gradle/|build\.gradle|settings\.gradle|gradlew)'; then
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "app_changed=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Prepare: bump version if needed (main only) ─────────────────────────
  prepare:
    needs: changes
    if: needs.changes.outputs.app_changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      version_bumped: ${{ steps.bump.outputs.version_bumped }}
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-increment patch version (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: bump
        run: |
          CURRENT=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)

          # Check if version was already bumped in this commit
          if git diff HEAD~1 -- app/build.gradle.kts | grep -q 'versionName'; then
            echo "version_bumped=false" >> "$GITHUB_OUTPUT"
            echo "new_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "Version already bumped manually to $CURRENT"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

            CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts)
            NEW_CODE=$((CURRENT_CODE + 1))

            sed -i "s/versionName = \"$CURRENT\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts
            sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts

            echo "version_bumped=true" >> "$GITHUB_OUTPUT"
            echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "Bumped: $CURRENT -> $NEW_VERSION (code $CURRENT_CODE -> $NEW_CODE)"
          fi

      - name: Read current version
        id: read
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload bumped source
        uses: actions/upload-artifact@v4
        with:
          name: source-bumped
          path: .
          include-hidden-files: true

  # ── Lint (runs in parallel with build) ───────────────────────────────────
  lint:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source-bumped

      - run: chmod +x gradlew

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run lint
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          WEB_CLIENT_ID: ${{ secrets.WEB_CLIENT_ID }}
        run: ./gradlew lintDebug

  # ── Build (runs in parallel with lint) ───────────────────────────────────
  build:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source-bumped

      - run: chmod +x gradlew

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      # PR: debug APK only
      - name: Build debug APK (PR)
        if: github.event_name == 'pull_request'
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          WEB_CLIENT_ID: ${{ secrets.WEB_CLIENT_ID }}
        run: ./gradlew assembleDebug

      - name: Upload debug APK (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # Main: release APK
      - name: Decode release keystore
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/ci-release.jks

      - name: Build release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          WEB_CLIENT_ID: ${{ secrets.WEB_CLIENT_ID }}
          KEYSTORE_FILE: ${{ github.workspace }}/app/ci-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

  # ── Publish: only after both lint and build succeed (main only) ──────────
  publish:
    needs: [prepare, lint, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: release-apk/

      # Apply version bump to the checkout
      - name: Apply version bump
        if: needs.prepare.outputs.version_bumped == 'true'
        run: |
          NEW_VERSION="${{ needs.prepare.outputs.new_version }}"
          CURRENT=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts)

          if [ "$CURRENT" != "$NEW_VERSION" ]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$NEW_VERSION"
            # Recompute new code from current
            NEW_CODE=$((CURRENT_CODE + 1))
            sed -i "s/versionName = \"$CURRENT\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts
            sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts
          fi

      # Commit version bump
      - name: Commit version bump
        if: needs.prepare.outputs.version_bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${{ needs.prepare.outputs.new_version }} [skip ci]"
          git push

      # Tag
      - name: Determine release version
        id: release_version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Tag release
        id: tagging
        run: |
          TAG="${{ steps.release_version.outputs.tag }}"
          if ! git tag -l "$TAG" | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release ${{ steps.release_version.outputs.version }}"
            git push origin "$TAG"
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists, skipping"
          fi

      # Rename APK
      - name: Rename release APK
        run: |
          VERSION="${{ steps.release_version.outputs.version }}"
          RELEASE_APK=$(find release-apk/ -name "*.apk" | head -1)
          if [ -n "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" "release-apk/RallyTrax-v${VERSION}.apk"
          fi

      # Release notes
      - name: Generate release notes
        if: steps.tagging.outputs.created == 'true'
        run: |
          TAG="${{ steps.release_version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^$TAG$" | head -n 1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges | grep -v '\[skip ci\]')
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | grep -v '\[skip ci\]')
          fi
          cat > /tmp/release_notes.md << NOTES_EOF
          ## What's Changed

          $CHANGELOG

          ---
          **Full Changelog**: ${PREV_TAG:+\`$PREV_TAG\`...\`$TAG\`}${PREV_TAG:-Initial release}
          NOTES_EOF

      # GitHub Release
      - name: Create GitHub Release
        if: steps.tagging.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release_version.outputs.tag }}"
          VERSION="${{ steps.release_version.outputs.version }}"
          gh release create "$TAG" \
            --title "RallyTrax $VERSION" \
            --notes-file /tmp/release_notes.md \
            "release-apk/RallyTrax-v${VERSION}.apk"
