name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Gate: detect if app files changed ────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.check.outputs.app_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for app changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="HEAD~1"
          fi
          if git diff --name-only "$BASE_SHA" HEAD | grep -qE '^(app/|gradle/|build\.gradle|settings\.gradle|gradlew)'; then
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "app_changed=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    needs: changes
    if: needs.changes.outputs.app_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: chmod +x gradlew

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Inject Firebase API key
        run: sed -i 's/FIREBASE_API_KEY_PLACEHOLDER/${{ secrets.FIREBASE_API_KEY }}/' app/google-services.json

      - name: Run lint
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          WEB_CLIENT_ID: ${{ secrets.WEB_CLIENT_ID }}
        run: ./gradlew lintDebug

  # ── Unit Tests ──────────────────────────────────────────────────────────
  test:
    needs: changes
    if: needs.changes.outputs.app_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: chmod +x gradlew

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Inject Firebase API key
        run: sed -i 's/FIREBASE_API_KEY_PLACEHOLDER/${{ secrets.FIREBASE_API_KEY }}/' app/google-services.json

      - name: Run unit tests
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          WEB_CLIENT_ID: ${{ secrets.WEB_CLIENT_ID }}
        run: ./gradlew test

  # ── Build debug APK ─────────────────────────────────────────────────────
  build:
    needs: changes
    if: needs.changes.outputs.app_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: chmod +x gradlew

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Inject Firebase API key
        run: sed -i 's/FIREBASE_API_KEY_PLACEHOLDER/${{ secrets.FIREBASE_API_KEY }}/' app/google-services.json

      - name: Build debug APK
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          WEB_CLIENT_ID: ${{ secrets.WEB_CLIENT_ID }}
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
